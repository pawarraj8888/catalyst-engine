name: live-calls

# Runs twice each weekday: morning scan to log new calls, evening
# resolve to fill in realized outcomes. Commits live_log/ and the
# DuckDB warehouse back to main so state persists between runs.
#
# Manually triggerable via the Actions tab.

on:
  schedule:
    # 13:00 UTC = 09:00 ET (DST) / 08:00 ET (standard) -- pre-market scan
    - cron: "0 13 * * 1-5"
    # 21:00 UTC = 17:00 ET (DST) / 16:00 ET (standard) -- post-close resolve
    - cron: "0 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Which step to run"
        required: true
        default: "scan"
        type: choice
        options: [scan, resolve, both]

permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true   # pull data/processed/catalyst.duckdb

      - name: Verify warehouse loaded
        run: |
          if [[ ! -f data/processed/catalyst.duckdb ]]; then
            echo "::error::DuckDB not found at data/processed/catalyst.duckdb"
            exit 1
          fi
          ls -la data/processed/catalyst.duckdb
          echo "Warehouse size: $(du -h data/processed/catalyst.duckdb | cut -f1)"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      # --- Incremental data refresh ----------------------------------
      # These run on every cron. Each one is non-fatal (continue-on-error)
      # so a single transient API failure doesn't block the scan/resolve.
      # The DB is committed back to LFS at the end, so partial successes
      # still persist.

      - name: Refresh upcoming earnings calendar (Finnhub)
        continue-on-error: true
        run: uv run catalyst ingest earnings --calendar-days 30 --skip-history

      - name: Refresh recent EDGAR filings (last 14 days, Form 4 + 8-K)
        continue-on-error: true
        run: uv run catalyst ingest edgar --days 14 --forms "4,8-K"

      - name: Refresh recent prices (last year, yfinance)
        continue-on-error: true
        run: uv run catalyst ingest prices --years 1

      - name: Recompute realized_moves
        run: uv run catalyst features realized-moves

      # --- Live loop -------------------------------------------------

      - name: Scan upcoming events
        if: github.event.schedule == '0 13 * * 1-5' || github.event.inputs.mode == 'scan' || github.event.inputs.mode == 'both'
        run: uv run catalyst live scan --horizon 14

      - name: Resolve past calls
        if: github.event.schedule == '0 21 * * 1-5' || github.event.inputs.mode == 'resolve' || github.event.inputs.mode == 'both'
        run: uv run catalyst live resolve

      - name: Print status
        run: uv run catalyst live status

      # --- Persist state back to repo --------------------------------

      - name: Commit and push live_log/ + warehouse updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add live_log/ data/processed/catalyst.duckdb

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          # Detect what kind of run this was for the commit message
          if [[ "${{ github.event.schedule }}" == "0 13 * * 1-5" ]] || [[ "${{ github.event.inputs.mode }}" == "scan" ]]; then
            MSG="live: morning scan $(date -u +%Y-%m-%d)"
          elif [[ "${{ github.event.schedule }}" == "0 21 * * 1-5" ]] || [[ "${{ github.event.inputs.mode }}" == "resolve" ]]; then
            MSG="live: evening resolve $(date -u +%Y-%m-%d)"
          else
            MSG="live: scan + resolve $(date -u +%Y-%m-%d)"
          fi

          git commit -m "$MSG" -m "Auto-generated by .github/workflows/live.yml"
          git push
