name: live-calls

# Runs twice each weekday: morning scan to log new calls, evening
# resolve to fill in realized outcomes. Commits and pushes any
# changes to live_log/ back to main.
#
# Manually triggerable via the Actions tab.

on:
  schedule:
    # 13:00 UTC = 09:00 ET (DST) / 08:00 ET (standard) -- pre-market scan
    - cron: "0 13 * * 1-5"
    # 21:00 UTC = 17:00 ET (DST) / 16:00 ET (standard) -- post-close resolve
    - cron: "0 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Which step to run"
        required: true
        default: "scan"
        type: choice
        options: [scan, resolve, both]

permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can push commits back
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Refresh upcoming earnings calendar
        # Only on the morning scan -- before the resolve we don't need
        # to re-pull the calendar (the day's events are already in).
        if: github.event.schedule == '0 13 * * 1-5' || github.event.inputs.mode == 'scan' || github.event.inputs.mode == 'both'
        run: |
          uv run catalyst ingest earnings || true
          # Don't fail the whole job if Finnhub blips -- old calendar
          # is still usable for resolve.

      - name: Refresh recent EDGAR filings (last 14 days)
        if: github.event.schedule == '0 13 * * 1-5' || github.event.inputs.mode == 'scan' || github.event.inputs.mode == 'both'
        run: |
          uv run catalyst ingest edgar --days 14 --forms 4 || true

      - name: Refresh recent prices
        # Always do this -- resolve needs yesterday's close.
        run: |
          uv run catalyst ingest prices --days 7 || true

      - name: Recompute realized_moves
        # Cheap; keeps the trailing baselines up to date for resolve.
        run: uv run catalyst features realized-moves

      - name: Scan upcoming events
        if: github.event.schedule == '0 13 * * 1-5' || github.event.inputs.mode == 'scan' || github.event.inputs.mode == 'both'
        run: uv run catalyst live scan --horizon 14

      - name: Resolve past calls
        if: github.event.schedule == '0 21 * * 1-5' || github.event.inputs.mode == 'resolve' || github.event.inputs.mode == 'both'
        run: uv run catalyst live resolve

      - name: Print status
        run: uv run catalyst live status

      - name: Commit and push live_log changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- live_log/; then
            echo "No live_log changes to commit."
            exit 0
          fi

          git add live_log/
          # Detect what changed for the commit message
          if [[ "${{ github.event.schedule }}" == "0 13 * * 1-5" ]] || [[ "${{ github.event.inputs.mode }}" == "scan" ]]; then
            git commit -m "live: morning scan $(date -u +%Y-%m-%d)" -m "Auto-generated by .github/workflows/live.yml"
          elif [[ "${{ github.event.schedule }}" == "0 21 * * 1-5" ]] || [[ "${{ github.event.inputs.mode }}" == "resolve" ]]; then
            git commit -m "live: evening resolve $(date -u +%Y-%m-%d)" -m "Auto-generated by .github/workflows/live.yml"
          else
            git commit -m "live: scan + resolve $(date -u +%Y-%m-%d)" -m "Auto-generated by .github/workflows/live.yml"
          fi

          git push
