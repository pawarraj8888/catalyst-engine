# Catalyst scoring rules.
#
# Each rule fires on a feature condition and contributes a weighted score.
# Final score per setup = sum(weight) of rules that fire, capped at 10.
#
# Rules are evaluated by src/catalyst_engine/scoring/scorer.py.
# Phase 2 will populate this with real rules calibrated against the backtest.

version: 1
last_updated: 2026-05-27

# Score above which a setup is "high conviction" — gets a onepager
high_conviction_threshold: 7

earnings:
  # Vol cheap into print (placeholder weights — to calibrate in Phase 3)
  implied_cheap:
    description: Implied move materially below trailing realized
    condition: ratio_implied_to_realized < 0.80
    weight: 3
    direction_signal: setup is two-way; direction comes from skew

  implied_expensive:
    description: Implied move materially above trailing realized
    condition: ratio_implied_to_realized > 1.30
    weight: 2
    direction_signal: short premium setup

  # Positioning
  short_squeeze_setup:
    description: High SI + high days-to-cover
    condition: si_pct_float > 0.15 AND days_to_cover > 5
    weight: 2
    direction_signal: long-biased into beat

  insider_cluster_buying:
    description: Multiple insiders buying in last 90d
    condition: insider_net_value_90d > 0 AND insider_distinct_buyers >= 3
    weight: 2
    direction_signal: long-biased

  # Skew
  skew_extreme_put_bid:
    description: 25Δ put skew z > 2 vs 90d baseline
    condition: put_skew_zscore > 2
    weight: 1
    direction_signal: market hedged for downside

  skew_extreme_call_bid:
    description: 25Δ call skew z > 2 vs 90d baseline
    condition: call_skew_zscore > 2
    weight: 1
    direction_signal: market positioned for upside

# Other catalyst types — Phase 2
material_8k:
  # Placeholder
  guidance_revision_recent: { weight: 2 }

fda:
  # Placeholder
  pdufa_with_phase3_strength: { weight: 3 }

guidance:
  # Placeholder
  consecutive_cuts: { weight: 2 }
